name: quota-bar
options:
  bundleIdPrefix: com.quota
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_ENTITLEMENTS: ""

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  quota-bar:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Models
      - path: Resources
      - path: Services
      - path: screenshot
      - path: StatusBar
      - path: ViewModels
      - path: Views
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_NAME: QuotaBar
        PRODUCT_BUNDLE_IDENTIFIER: com.quota.statusbar
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPublicEDKey: "8n6qpNCw5nnChaXomz88SKWPaYUXfvSo8P9fMpq/6hs="

  quota-bar-tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: quota-bar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quota.statusbar.tests
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/QuotaBar.app/Contents/MacOS/QuotaBar"
        MODULE_NAME: quota_bar_tests
